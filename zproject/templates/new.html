{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm p-4 mb-4">
            <h2 class="text-center mb-4">SIP Calculator</h2>

            <form action="/" method="POST">
                <div class="mb-3">
                    <label class="form-label">Monthly Investment (₹)</label>
                    <input type="number" name="monthly_deposit" class="form-control" required placeholder="Enter monthly investment">
                </div>
                <div class="mb-3">
                    <label class="form-label">Expected Return Rate (% p.a.)</label>
                    <input type="number" step="0.1" name="annual_rate" class="form-control" required placeholder="Enter expected annual return rate">
                </div>
                <div class="mb-3">
                    <label class="form-label">Time Period (Years)</label>
                    <input type="number" step="0.5" name="years" class="form-control" required placeholder="Enter investment duration">
                </div>
                <div class="mb-3">
                    <label class="form-label">Yearly Increment (Years)</label>
                    <input type="number" step="0.5" name="inc" class="form-control" required placeholder="Enter yearly increment">
                </div>
                <button type="submit" class="btn btn-primary w-100">Calculate</button>
            </form>
        </div>

        <!-- ─── RESULTS PANEL ─── -->
        <!-- This entire block stays invisible until the user hits submit -->
        {% if results %}
        <div class="card shadow-sm p-4 border-success">
            <h3 class="text-center text-success mb-4">Investment Summary</h3>

            <div class="row text-center">
                <div class="col-6 mb-3">
                    <div class="text-muted small">Total Invested</div>
                    <div class="fs-4 fw-bold text-dark">₹{{ results.total_invested }}</div>
                </div>
                <div class="col-6 mb-3">
                    <div class="text-muted small">Estimated Wealth Gain</div>
                    <div class="fs-4 fw-bold text-success">+ ₹{{ results.gain }}</div>
                </div>
                <div class="col-12 mt-2 pt-3 border-top">
                    <div class="text-muted small">Total Expected Value</div>
                    <div class="fs-2 fw-bold text-primary">₹{{ results.total_amount }}</div>
                </div>
            </div>
        </div>
        {% endif %}

    </div>
</div>
{% endblock %}
